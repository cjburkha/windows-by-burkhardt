name: Deploy to AWS

on:
  push:
    branches:
      - master

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: windows-by-burkhardt
  CONTAINER_NAME: windows-by-burkhardt

jobs:
  # ── Detect which parts changed ───────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          frontend:
            - 'public/**'
            - '!public/index.html'
          backend:
            - 'server.js'
            - 'services/**'
            - 'prisma/**'
            - 'prisma.config.ts'
            - 'Dockerfile'
            - 'package*.json'
            - 'public/index.html'

  # ── Fast path: CSS/JS/images → S3 sync (~15 seconds) ─────────────────────────
  # index.html is excluded — it's rendered server-side with tenant tokens.
  # Static files are served from S3 directly (ASSET_BASE_URL in App Runner env).
  deploy-frontend:
    name: Deploy static assets (S3 ~15s)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Sync static assets to S3
      run: |
        aws s3 sync public/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
          --exclude "*.html" \
          --cache-control "public,max-age=86400" \
          --delete
        echo "Static assets synced to s3://${{ secrets.S3_BUCKET_NAME }}"

  # ── Slow path: Docker build → ECR → App Runner (~2–5 minutes) ────────────────
  # Docker BuildKit GHA cache: node_modules layer is reused when package.json
  # is unchanged, cutting build time from ~3 min to ~45s for code-only changes.
  deploy-backend:
    name: Build & deploy API (Docker + App Runner)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run database migrations
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: bash scripts/db-migrate.sh

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker buildx build --platform linux/amd64 --provenance=false \
          --cache-from type=gha \
          --cache-to   type=gha,mode=max \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
          --push .
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Deploy to AWS App Runner
      run: |
        aws apprunner update-service \
          --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
          --source-configuration "{\"ImageRepository\":{\"ImageIdentifier\":\"${{ steps.build-image.outputs.image }}\",\"ImageConfiguration\":{\"Port\":\"3000\",\"RuntimeEnvironmentVariables\":{\"NODE_ENV\":\"production\",\"ASSET_VERSION\":\"${{ github.sha }}\",\"ASSET_BASE_URL\":\"https://wbb-static-prod.s3.us-east-1.amazonaws.com\",\"AWS_REGION\":\"${{ env.AWS_REGION }}\",\"AWS_ACCESS_KEY_ID\":\"${{ secrets.AWS_SES_ACCESS_KEY_ID }}\",\"AWS_SECRET_ACCESS_KEY\":\"${{ secrets.AWS_SES_SECRET_ACCESS_KEY }}\",\"AWS_SES_FROM_EMAIL\":\"${{ secrets.AWS_SES_FROM_EMAIL }}\",\"RECIPIENT_EMAIL\":\"${{ secrets.RECIPIENT_EMAIL }}\",\"DATABASE_URL\":\"${{ secrets.DATABASE_URL }}\",\"APEX_DATABASE_URL\":\"${{ secrets.APEX_DATABASE_URL }}\"}},\"ImageRepositoryType\":\"ECR\"}}" \
          --region ${{ env.AWS_REGION }}

    - name: Wait for App Runner deployment
      # 'aws apprunner wait' is not a supported subcommand — poll manually.
      # Checks every 15s for up to 10 minutes (40 attempts).
      run: |
        echo "Waiting for App Runner service to reach RUNNING state..."
        for i in $(seq 1 40); do
          STATUS=$(aws apprunner describe-service \
            --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Service.Status' --output text)
          echo "  attempt $i/40 — status: $STATUS"
          if [ "$STATUS" = "RUNNING" ]; then
            echo "Service is RUNNING — deployment complete."
            break
          fi
          if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "DELETE_FAILED" ]; then
            echo "Service entered failed state: $STATUS"
            exit 1
          fi
          sleep 15
        done
        echo "Service URL: https://${{ secrets.APP_RUNNER_DOMAIN }}"

  # ── Smoke tests ──────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke tests (prod)
    needs: [changes, deploy-frontend, deploy-backend]
    # Run when at least one deploy job ran and none failed.
    # 'skipped' is OK (means that deploy path wasn't needed).
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Generate Prisma client
      run: npx prisma generate

    - name: Smoke tests — burkhardt (full suite)
      # Runs all tests including email generation against the real production server.
      # navigator.webdriver=true auto-routes GA4 events to DebugView.
      env:
        BASE_URL: https://${{ secrets.APP_RUNNER_DOMAIN }}
      run: npx playwright test --project=burkhardt

    - name: Smoke tests — jose (branding only, email tests skipped)
      # JOSE_BASE_URL re-enabled here — but tests tagged "(no mock)" are excluded
      # via --grep-invert so no real SES emails are sent to jose.martinez.
      # Tenant branding (title, headline, favicon, GA4 ID) is still verified.
      env:
        BASE_URL:      https://${{ secrets.APP_RUNNER_DOMAIN }}
        JOSE_BASE_URL: https://windowsbyjose.com
      run: npx playwright test --project=jose --grep-invert "no mock"

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14
