name: Deploy to AWS

on:
  push:
    branches:
      - master

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: windows-by-burkhardt
  CONTAINER_NAME: windows-by-burkhardt

jobs:
  # ── Detect which parts changed ───────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          frontend:
            - 'public/**'
            - '!public/index.html'
          backend:
            - 'server.js'
            - 'services/**'
            - 'prisma/**'
            - 'prisma.config.ts'
            - 'Dockerfile'
            - 'package*.json'
            - 'public/index.html'

  # ── Fast path: CSS/JS/images → S3 sync (~15 seconds) ─────────────────────────
  # index.html is excluded — it's rendered server-side with tenant tokens.
  # Static files are served from S3 directly (ASSET_BASE_URL in App Runner env).
  deploy-frontend:
    name: Deploy static assets (S3 ~15s)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Sync static assets to S3
      run: |
        aws s3 sync public/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
          --exclude "*.html" \
          --cache-control "public,max-age=86400" \
          --delete
        echo "Static assets synced to s3://${{ secrets.S3_BUCKET_NAME }}"

    - name: Sync HTML templates to S3
      # Inner page HTML files are stored under _templates/ so App Runner can
      # fetch them at request time — changes go live in ~15s without a Docker rebuild.
      # index.html is excluded — it is baked into the Docker image (needs tenant tokens
      # applied at startup before ASSET_VERSION is known).
      run: |
        aws s3 sync public/ s3://${{ secrets.S3_BUCKET_NAME }}/_templates/ \
          --exclude "*" \
          --include "*.html" \
          --exclude "index.html" \
          --cache-control "no-store" \
          --delete
        echo "HTML templates synced to s3://${{ secrets.S3_BUCKET_NAME }}/_templates/"

    - name: Invalidate CloudFront cache
      run: |
        if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "CloudFront cache invalidated"
        else
          echo "No CLOUDFRONT_DISTRIBUTION_ID secret set — skipping invalidation"
        fi

  # ── Slow path: Docker build → ECR → App Runner (~2–5 minutes) ────────────────
  # Docker BuildKit GHA cache: node_modules layer is reused when package.json
  # is unchanged, cutting build time from ~3 min to ~45s for code-only changes.
  deploy-backend:
    name: Build & deploy API (Docker + App Runner)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run database migrations
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: bash scripts/db-migrate.sh

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker buildx build --platform linux/amd64 --provenance=false \
          --cache-from type=gha \
          --cache-to   type=gha,mode=max \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
          --push .
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Deploy to AWS App Runner
      env:
        DB_URL:       ${{ secrets.DATABASE_URL }}
        APEX_DB_URL:  ${{ secrets.APEX_DATABASE_URL }}
        SES_KEY:      ${{ secrets.AWS_SES_ACCESS_KEY_ID }}
        SES_SECRET:   ${{ secrets.AWS_SES_SECRET_ACCESS_KEY }}
        SES_FROM:     ${{ secrets.AWS_SES_FROM_EMAIL }}
        RECIPIENT:    ${{ secrets.RECIPIENT_EMAIL }}
      run: |
        # Use jq to build the JSON so special characters in secrets are safely escaped
        CONFIG=$(jq -n \
          --arg image    "${{ steps.build-image.outputs.image }}" \
          --arg sha      "${{ github.sha }}" \
          --arg region   "${{ env.AWS_REGION }}" \
          --arg ses_key  "$SES_KEY" \
          --arg ses_sec  "$SES_SECRET" \
          --arg ses_from "$SES_FROM" \
          --arg recip    "$RECIPIENT" \
          --arg db_url   "$DB_URL" \
          --arg apex_db  "$APEX_DB_URL" \
          '{
            ImageRepository: {
              ImageIdentifier: $image,
              ImageConfiguration: {
                Port: "3000",
                RuntimeEnvironmentVariables: {
                  NODE_ENV:          "production",
                  ASSET_VERSION:     $sha,
                  ASSET_BASE_URL:    "https://wbb-static-prod.s3.us-east-1.amazonaws.com",
                  AWS_REGION:        $region,
                  AWS_ACCESS_KEY_ID: $ses_key,
                  AWS_SECRET_ACCESS_KEY: $ses_sec,
                  AWS_SES_FROM_EMAIL: $ses_from,
                  RECIPIENT_EMAIL:   $recip,
                  DATABASE_URL:      $db_url,
                  APEX_DATABASE_URL: $apex_db
                }
              },
              ImageRepositoryType: "ECR"
            }
          }')
        # Retry up to 10 times (90s apart) in case a previous deploy is still in progress.
        for attempt in $(seq 1 10); do
          OUTPUT=$(aws apprunner update-service \
            --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
            --source-configuration "$CONFIG" \
            --region ${{ env.AWS_REGION }} 2>&1) && break
          if echo "$OUTPUT" | grep -q 'OPERATION_IN_PROGRESS'; then
            echo "  App Runner busy (attempt $attempt/10) — waiting 90s..."
            sleep 90
          else
            echo "$OUTPUT"
            exit 1
          fi
        done

    - name: Wait for App Runner deployment
      # 'aws apprunner wait' is not a supported subcommand — poll manually.
      # Checks every 15s for up to 10 minutes (40 attempts).
      run: |
        echo "Waiting for App Runner service to reach RUNNING state..."
        for i in $(seq 1 40); do
          STATUS=$(aws apprunner describe-service \
            --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Service.Status' --output text)
          echo "  attempt $i/40 — status: $STATUS"
          if [ "$STATUS" = "RUNNING" ]; then
            echo "Service is RUNNING — deployment complete."
            break
          fi
          if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "DELETE_FAILED" ]; then
            echo "Service entered failed state: $STATUS"
            exit 1
          fi
          sleep 15
        done
        echo "Service URL: https://${{ secrets.APP_RUNNER_DOMAIN }}"

  # ── Smoke tests ──────────────────────────────────────────────────────────────
  # CONTRACT: smoke-test MUST pass for a deploy to be considered successful.
  # - Runs only when at least one deploy job actually succeeded (not just skipped).
  # - Verifies the new image SHA is live before running Playwright tests.
  # - deploy-gate (below) is the required status check — never bypass it.
  smoke-test:
    name: Smoke tests (prod)
    needs: [deploy-frontend, deploy-backend]
    # Only run if at least one deploy succeeded. 'skipped' is fine; 'failure' is not.
    if: |
      always() &&
      (needs.deploy-frontend.result == 'success' || needs.deploy-backend.result == 'success') &&
      needs.deploy-frontend.result != 'failure' &&
      needs.deploy-backend.result != 'failure'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Generate Prisma client
      run: npx prisma generate

    - name: Verify new version is live
      # Confirms the deployed App Runner container is actually serving the new
      # image before we run smoke tests. Polls /health for up to 3 minutes.
      # Without this, smoke tests could pass against the *old* container while
      # the new one is still rolling out (or silently rolled back).
      run: |
        echo "Waiting for https://${{ secrets.APP_RUNNER_DOMAIN }}/health to respond..."
        for i in $(seq 1 18); do
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            https://${{ secrets.APP_RUNNER_DOMAIN }}/health || echo "000")
          echo "  attempt $i/18 — HTTP $HTTP"
          if [ "$HTTP" = "200" ]; then
            echo "Health check passed — prod is up."
            break
          fi
          if [ $i -eq 18 ]; then
            echo "ERROR: prod did not return 200 after 3 minutes."
            exit 1
          fi
          sleep 10
        done

    - name: Run smoke tests
      # BASE_URL / JOSE_BASE_URL point to the App Runner custom domains via Route 53.
      # navigator.webdriver is true in Playwright so analytics.js auto-routes
      # smoke traffic to GA4 DebugView — excluded from standard reports.
      # "--grep-invert no mock" is a safety net — skips any test explicitly tagged
      # 'no mock' that makes real SES/API calls in prod (currently none).
      env:
        BASE_URL:      https://${{ secrets.APP_RUNNER_DOMAIN }}
        JOSE_BASE_URL: https://windowsbyjose.com
        DATABASE_URL:  ${{ secrets.DATABASE_URL }}
      run: npx playwright test --grep-invert "no mock"

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14

  # ── Deployment gate ───────────────────────────────────────────────────────────
  # This job is the single required status check to set in GitHub branch protection.
  # It fails if any deploy or smoke test failed — succeeds only when everything
  # is green (or when no deploy was needed and nothing ran).
  #
  # To enforce: Settings → Branches → master → Require status checks →
  #   add "Deployment gate" as required before merging.
  deploy-gate:
    name: Deployment gate
    needs: [deploy-frontend, deploy-backend, smoke-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Check all jobs passed
      run: |
        frontend="${{ needs.deploy-frontend.result }}"
        backend="${{ needs.deploy-backend.result }}"
        smoke="${{ needs.smoke-test.result }}"
        echo "deploy-frontend : $frontend"
        echo "deploy-backend  : $backend"
        echo "smoke-test      : $smoke"
        # Fail if any job that actually ran came back as failure or cancelled
        for result in "$frontend" "$backend" "$smoke"; do
          if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
            echo ""
            echo "DEPLOY FAILED — one or more jobs did not pass. Check the logs above."
            exit 1
          fi
        done
        echo ""
        echo "All jobs passed (or were not needed). Deployment confirmed."
