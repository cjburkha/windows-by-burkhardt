name: Deploy to AWS

on:
  push:
    branches:
      - master

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: windows-by-burkhardt
  CONTAINER_NAME: windows-by-burkhardt

jobs:
  # ── Deploy: Docker build → ECR push → App Runner update (~5 minutes) ────────
  # Static assets (CSS/JS) are baked into the Docker image and served by Express.
  # App Runner native custom domains handle TLS — no CloudFront needed.
  deploy:
    name: Build & deploy (Docker + App Runner)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run database migrations
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: bash scripts/db-migrate.sh

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker buildx build --platform linux/amd64 --provenance=false \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
          --push .
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Deploy to AWS App Runner
      run: |
        aws apprunner update-service \
          --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
          --source-configuration "{\"ImageRepository\":{\"ImageIdentifier\":\"${{ steps.build-image.outputs.image }}\",\"ImageConfiguration\":{\"Port\":\"3000\",\"RuntimeEnvironmentVariables\":{\"NODE_ENV\":\"production\",\"ASSET_VERSION\":\"${{ github.sha }}\",\"AWS_REGION\":\"${{ env.AWS_REGION }}\",\"AWS_ACCESS_KEY_ID\":\"${{ secrets.AWS_SES_ACCESS_KEY_ID }}\",\"AWS_SECRET_ACCESS_KEY\":\"${{ secrets.AWS_SES_SECRET_ACCESS_KEY }}\",\"AWS_SES_FROM_EMAIL\":\"${{ secrets.AWS_SES_FROM_EMAIL }}\",\"RECIPIENT_EMAIL\":\"${{ secrets.RECIPIENT_EMAIL }}\",\"DATABASE_URL\":\"${{ secrets.DATABASE_URL }}\"}},\"ImageRepositoryType\":\"ECR\"}}" \
          --region ${{ env.AWS_REGION }}

    - name: Wait for deployment
      run: |
        echo "Waiting for App Runner service to update..."
        aws apprunner wait service-running \
          --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
          --region ${{ env.AWS_REGION }} || true

    - name: Deployment complete
      run: |
        echo "API deployment complete!"
        echo "Service URL: https://${{ secrets.APP_RUNNER_DOMAIN }}"

  # ── Smoke tests ──────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke tests (prod)
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Generate Prisma client
      run: npx prisma generate

    - name: Run smoke tests
      # BASE_URL / JOSE_BASE_URL point to the App Runner custom domains via Route 53.
      # navigator.webdriver is true in Playwright so analytics.js auto-routes
      # smoke traffic to GA4 DebugView — excluded from standard reports.
      env:
        BASE_URL:      https://${{ secrets.APP_RUNNER_DOMAIN }}
        JOSE_BASE_URL: https://windowsbyjose.com
      run: npm test
