name: Deploy to AWS

on:
  push:
    branches:
      - master

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: windows-by-burkhardt
  CONTAINER_NAME: windows-by-burkhardt

jobs:
  # ── Detect which parts of the repo changed ──────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          frontend:
            - 'public/**'
            - '!public/index.html'
          backend:
            - 'server.js'
            - 'services/**'
            - 'prisma/**'
            - 'prisma.config.ts'
            - 'Dockerfile'
            - 'package*.json'
            - 'public/index.html'

  # ── Frontend path: S3 sync + CloudFront invalidation (~15 seconds) ──────────
  deploy-frontend:
    name: Deploy static assets (S3 + CloudFront)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Sync CSS/JS/assets (long cache — CloudFront invalidation refreshes CDN)
      # index.html is excluded: it contains {{TENANT_*}} tokens and is rendered
      # server-side by App Runner, never served directly from S3.
      run: |
        aws s3 sync public/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
          --delete \
          --exclude "*.html" \
          --cache-control "public,max-age=86400"

    - name: Invalidate CloudFront cache (both tenant distributions)
      run: |
        for DIST_ID in ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_JOSE }}; do
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id $DIST_ID \
            --paths "/" "/styles.css*" "/script.js*" "/analytics.js*" "/*.svg" "/*.ico" \
            --query "Invalidation.Id" --output text)
          echo "Invalidation $INVALIDATION_ID for $DIST_ID"
        done
        echo "Static assets live at: https://${{ secrets.APP_RUNNER_DOMAIN }}"

  # ── Backend path: Docker build → ECR push → App Runner deploy (~5 minutes) ──
  deploy-backend:
    name: Build & deploy API (Docker + App Runner)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run database migrations
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: bash scripts/db-migrate.sh

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker buildx build --platform linux/amd64 --provenance=false \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
          --push .
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Deploy to AWS App Runner
      run: |
        aws apprunner update-service \
          --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
          --source-configuration "{\"ImageRepository\":{\"ImageIdentifier\":\"${{ steps.build-image.outputs.image }}\",\"ImageConfiguration\":{\"Port\":\"3000\",\"RuntimeEnvironmentVariables\":{\"NODE_ENV\":\"production\",\"ASSET_VERSION\":\"${{ github.sha }}\",\"AWS_REGION\":\"${{ env.AWS_REGION }}\",\"AWS_ACCESS_KEY_ID\":\"${{ secrets.AWS_SES_ACCESS_KEY_ID }}\",\"AWS_SECRET_ACCESS_KEY\":\"${{ secrets.AWS_SES_SECRET_ACCESS_KEY }}\",\"AWS_SES_FROM_EMAIL\":\"${{ secrets.AWS_SES_FROM_EMAIL }}\",\"RECIPIENT_EMAIL\":\"${{ secrets.RECIPIENT_EMAIL }}\",\"DATABASE_URL\":\"${{ secrets.DATABASE_URL }}\"}},\"ImageRepositoryType\":\"ECR\"}}" \
          --region ${{ env.AWS_REGION }}

    - name: Wait for deployment
      run: |
        echo "Waiting for App Runner service to update..."
        aws apprunner wait service-running \
          --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }} \
          --region ${{ env.AWS_REGION }} || true

    - name: Deployment complete
      run: |
        echo "API deployment complete!"
        echo "Service URL: https://${{ secrets.APP_RUNNER_DOMAIN }}"

  # ── Smoke tests ──────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke tests (prod)
    needs: [changes, deploy-frontend, deploy-backend]
    # Run when at least one deploy job ran and none failed.
    # 'skipped' is OK (means that deploy path wasn't needed).
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Generate Prisma client
      run: npx prisma generate

    - name: Run smoke tests
      # BASE_URL points to the Burkhardt CloudFront domain (APP_RUNNER_DOMAIN secret).
      # JOSE_BASE_URL points to the Jose CloudFront domain — enables the "jose"
      # Playwright project which runs tenants.spec.ts against windowsbyjose.com.
      #
      # navigator.webdriver is true in all Playwright sessions, so analytics.js
      # automatically sends smoke test traffic to GA4 DebugView only —
      # excluded from standard reports without any URL changes needed.
      #
      # Test strategy:
      #   Backend changed → full suite (all tests, includes real SES send + DB write).
      #   Frontend-only   → UI-only tests; skips "no mock" + DB tests to avoid
      #                     spurious emails for every HTML/CSS tweak.
      env:
        BASE_URL:      https://${{ secrets.APP_RUNNER_DOMAIN }}
        JOSE_BASE_URL: https://windowsbyjose.com
        BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
      run: |
        if [ "$BACKEND_CHANGED" = "true" ]; then
          echo "Backend changed — running full test suite (includes SES + DB tests)"
          npm test
        else
          echo "Frontend-only change — running UI tests (skipping real-API tests)"
          npx playwright test --grep-invert "no mock|Database persistence"
        fi
